<!DOCTYPE html>
<html lang="en">
    <head>
        <title>auto (track size)</title>
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="wrapper">
            <div id="title">
                <h1>Track size units (auto)</h1>
            </div>
            <div id="container">
                <div class="item">
                    <div class="item-title">
                        <h2>1 column</h2>
                    </div>
                    <div id="item1" class="item-content">
                        <div class="cols"></div>
                    </div>
                </div>
                <div class="item">
                    <div class="item-title">
                        <h2>2 columns</h2>
                    </div>
                    <div id="item2" class="item-content">
                        <div class="cols"></div>
                        <div class="cols"></div>
                    </div>
                </div>
                <div class="item">
                    <div class="item-title">
                        <h2>3 columns</h2>
                    </div>
                    <div id="item3" class="item-content">
                        <div class="cols"></div>
                        <div class="cols"></div>
                        <div class="cols"></div>
                    </div>
                </div>
                <div class="item">
                    <div class="item-title">
                        <h2>4 columns</h2>
                    </div>
                    <div id="item4" class="item-content">
                        <div class="cols"></div>
                        <div class="cols"></div>
                        <div class="cols"></div>
                        <div class="cols"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
