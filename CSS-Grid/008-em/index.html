<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Grid based on font size</title>
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">
    </head>
    <body>
        <div id="wrapper">
            <div class="container">
                <div class="title">Em based</div>
                <div class="grid-area em-based">
                    <div class="item">Item 1</div>
                    <div class="item">Item 2</div>
                    <div class="item">Item 3</div>
                    <div class="item">Item 4</div>
                </div>
            </div>
            <div class="container">
                <div class="title">Rem based</div>
                <div class="grid-area rem-based">
                    <div class="item">Item 1</div>
                    <div class="item">Item 2</div>
                    <div class="item">Item 3</div>
                    <div class="item">Item 4</div>
                </div>
            </div>
        </div>
    </body>
</html>
