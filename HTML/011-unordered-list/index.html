<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Unordered list in html</title>
        <meta charset="utf-8">
    </head>
    <body>
        <h1>My favourite colors</h1>
        <ul>
            <li>Black</li>
            <li>White</li>
            <li>Red</li>
            <li>Blue</li>
        </ul>

        <h2>Different types of an unordered list</h2>

        <h3>Square</h3>
        <ul type="square">
            <li>First</li>
            <li>Second</li>
            <li>Third</li>
        </ul>

        <h3>Circle</h3>
        <ul type="circle">
            <li>First</li>
            <li>Second</li>
            <li>Third</li>
        </ul>
    </body>
</html>
