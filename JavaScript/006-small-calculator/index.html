<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Small calculator</title>
        <meta charset="utf-8">
    </head>
    <body>
        <header>
            <h1>Small calculator in JavaScript!</h1>
        </header>
        <main>
            <p>Click the button to enter two values!</p>
            <p>These two values will be used to perform all the arithmetic operations</p>
            <button onclick="performOperations()">Start</button>
            <h2>Addition</h2>
            <p id="addition"></p>
            <h2>Substraction</h2>
            <p id="substraction"></p>
            <h2>Multiplication</h2>
            <p id="multiplication"></p>
            <h2>Division</h2>
            <p id="division"></p>
            <h2></h2>
            <h2>Exponent</h2>
            <p id="exponent"></p>
            <h2>Modulo</h2>
            <p id="modulo"></p>
        </main>
        <script src="index.js"></script>
    </body>
</html>
