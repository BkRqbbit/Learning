<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Data types (convertion)</title>
        <meta charset="utf-8">
    </head>
    <body>
        <h1>Type convertion</h1>
        <label for="age">Enter your age</label><br>
        <input id="age" type="text"><br>

        <p>Showing data after convertion</p>
        <p id="show-new-age"></p>
        <script src="script.js"></script>
    </body>
</html>
