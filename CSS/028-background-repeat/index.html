<!DOCTYPE html>
<html lang="en">
    <head>
        <title>background repeat property</title>
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">
    </head>
    <body>
        <div id="wrapper">
            <div class="container">
                <div class="title">repeat (default)</div>
                <div id="repeat" class="background"></div>
            </div>
            <div class="container">
                <div class="title">repeat-x</div>
                <div id="repeat-x" class="background"></div>
            </div>
            <div class="container">
                <div class="title">repeat-y</div>
                <div id="repeat-y" class="background"></div>
            </div>
            <div class="container">
                <div class="title">no-repeat</div>
                <div id="no-repeat" class="background"></div>
            </div>
            <div class="container">
                <div class="title">space</div>
                <div id="space" class="background"></div>
            </div>
            <div class="container">
                <div class="title">round</div>
                <div id="round" class="background"></div>
            </div>
        </div>
    </body>
</html>
