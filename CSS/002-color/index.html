<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Color property</title>
        <meta charset="utf-8">
        <style>
            body{
                background-color: teal;
                color: white;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Color property of CSS!</h1>
        </header>
        <main>
            <p>The color property allows you to change the text color of an html element</p>
        </main>
    </body>
</html>
