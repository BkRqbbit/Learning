<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Background color property</title>
        <meta charset="utf-8">
        <style>
            body{
                background-color: floralwhite;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>The background-color property of CSS</h1>
        </header>
        <main>
            <p>This property is used to configure the background-color of the html element we specify!</p>
        </main>
    </body>
</html>
